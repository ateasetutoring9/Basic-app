name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content files
        run: npm run content:check

      - name: Lint
        run: npm run lint

      - name: Build (static export)
        run: npm run build
        # No Supabase env vars needed — auth is client-side only in the static build.
        # Pages with auth checks use the `configured` guard and skip Supabase when
        # the public env vars are absent.
